name: tests

on:
  push:
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run unit tests (integration skipped by default)
        run: |
          PYTHONPATH=src python -m pytest -q

  postgres-integration-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: quant
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d quant"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run PostgreSQL integration tests
        env:
          TEST_POSTGRES_URL: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/quant
        run: |
          PYTHONPATH=src python -m pytest -q tests/test_postgres_corporate_action_integration.py
